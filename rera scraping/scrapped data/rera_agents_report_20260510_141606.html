<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP-RERA Agents Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1f4788 0%, #2563eb 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 30px 40px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 700;
            color: #1f4788;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 14px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls {
            padding: 30px 40px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .control-group input,
        .control-group select {
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .control-group input:focus,
        .control-group select:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .btn-secondary {
            background: #10b981;
            color: white;
        }

        .btn-secondary:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .table-container {
            padding: 0 40px 40px 40px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: #1f4788;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f1f5f9;
        }

        tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        tbody tr:nth-child(even):hover {
            background: #f1f5f9;
        }

        td {
            padding: 16px;
            font-size: 14px;
            color: #334155;
        }

        .no-results {
            text-align: center;
            padding: 60px;
            color: #64748b;
            font-size: 18px;
        }

        .footer {
            background: #f8fafc;
            padding: 20px 40px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            .controls-grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏘️ UP-RERA Registered Agents Report</h1>
            <p>Interactive dashboard with filtering, search, and export capabilities</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalCount">2</div>
                <div class="label">Total Agents</div>
            </div>
            <div class="stat-card">
                <div class="number" id="filteredCount">2</div>
                <div class="label">Filtered Results</div>
            </div>
            <div class="stat-card">
                <div class="number">2</div>
                <div class="label">With Phone</div>
            </div>
            <div class="stat-card">
                <div class="number">2</div>
                <div class="label">With Email</div>
            </div>
        </div>

        <div class="controls">
            <div class="controls-grid">
                <div class="control-group">
                    <label for="districtFilter">🗺️ Filter by District</label>
                    <select id="districtFilter">
                        <option value="">All Districts</option>
                        <option value="Gautam Buddha Nagar">Gautam Buddha Nagar</option><option value="Lucknow">Lucknow</option>
                    </select>
                </div>

                <div class="control-group">
                    <label for="searchBox">🔍 Search by Name</label>
                    <input type="text" id="searchBox" placeholder="Type to search agent names...">
                </div>
            </div>

            <div class="buttons">
                <button class="btn btn-primary" onclick="downloadCSV()">📥 Download CSV</button>
                <button class="btn btn-secondary" onclick="downloadPDF()">📄 Download PDF</button>
                <button class="btn btn-danger" onclick="resetFilters()">🔄 Reset Filters</button>
            </div>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>District</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p>Generated on May 10, 2026 at 02:16 PM | Source: rera_agents_All_Districts_20260510_141600.csv</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <script>
        // Data from Python
        const allData = [{"Agent_Number":2,"Name":"360 REALTORS LLP","Phone":9871898000.0,"Email":"SANJEEVK.ARORA@360REALTORS.COM","District":"Lucknow"},{"Agent_Number":3,"Name":"999 TECHNOLOGY VENTURES PRIVATE LIMITED","Phone":9711194190.0,"Email":"bm1999in@gmail.com","District":"Gautam Buddha Nagar"}];
        let filteredData = [...allData];

        // Initialize the table
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-results">No results found. Try adjusting your filters.</td></tr>';
                return;
            }

            tbody.innerHTML = data.map((agent, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${agent.Name}</td>
                    <td>${agent.Phone}</td>
                    <td>${agent.Email}</td>
                    <td>${agent.District}</td>
                </tr>
            `).join('');

            // Update filtered count
            document.getElementById('filteredCount').textContent = data.length;
        }

        // Filter function
        function applyFilters() {
            const districtFilter = document.getElementById('districtFilter').value.toLowerCase();
            const searchText = document.getElementById('searchBox').value.toLowerCase();

            filteredData = allData.filter(agent => {
                const matchesDistrict = !districtFilter || agent.District.toLowerCase() === districtFilter;
                const matchesSearch = !searchText || agent.Name.toLowerCase().includes(searchText);
                return matchesDistrict && matchesSearch;
            });

            renderTable(filteredData);
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('districtFilter').value = '';
            document.getElementById('searchBox').value = '';
            applyFilters();
        }

        // Download CSV
        function downloadCSV() {
            const headers = ['Agent_Number', 'Name', 'Phone', 'Email', 'District'];
            const csvContent = [
                headers.join(','),
                ...filteredData.map((agent, index) => [
                    index + 1,
                    `"${agent.Name}"`,
                    agent.Phone,
                    `"${agent.Email}"`,
                    `"${agent.District}"`
                ].join(','))
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);

            link.setAttribute('href', url);
            link.setAttribute('download', `rera_agents_filtered_${new Date().getTime()}.csv`);
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Download PDF
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Add title
            doc.setFontSize(18);
            doc.setTextColor(31, 71, 136);
            doc.text('UP-RERA Registered Agents Report', 14, 20);

            // Add metadata
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 28);
            doc.text(`Total Records: ${filteredData.length}`, 14, 33);

            // Prepare table data
            const tableData = filteredData.map((agent, index) => [
                index + 1,
                agent.Name,
                agent.Phone,
                agent.Email,
                agent.District
            ]);

            // Add table
            doc.autoTable({
                head: [['#', 'Name', 'Phone', 'Email', 'District']],
                body: tableData,
                startY: 40,
                theme: 'grid',
                headStyles: {
                    fillColor: [31, 71, 136],
                    textColor: 255,
                    fontStyle: 'bold',
                    fontSize: 9
                },
                bodyStyles: {
                    fontSize: 8
                },
                alternateRowStyles: {
                    fillColor: [245, 245, 245]
                },
                margin: { top: 40 }
            });

            // Save PDF
            doc.save(`rera_agents_filtered_${new Date().getTime()}.pdf`);
        }

        // Event listeners
        document.getElementById('districtFilter').addEventListener('change', applyFilters);
        document.getElementById('searchBox').addEventListener('input', applyFilters);

        // Initial render
        renderTable(filteredData);
    </script>
</body>
</html>
